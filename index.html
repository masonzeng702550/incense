<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#8b1a1a" />
  <title>環保電子香｜線上數位上香・電子香爐・牌位祭祖・誦經</title>
  <meta name="description" content="環保電子香是無煙、無火、零空汙的數位上香 App。支援電子香爐、擲筊、牌位祭祖（往生蓮位）、誦經佛音與早晚拜拜提醒，寺廟與居家皆適用，可安裝離線使用。" />
  <meta name="keywords" content="電子香,數位上香,線上拜拜,電子香爐,牌位,祖先牌位,往生蓮位,神主牌,擲筊,誦經,佛經,寺廟,環保香,無煙香,拜拜提醒,PWA" />
  <meta name="author" content="環保電子香" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://masonzeng702550.github.io/incense/" />

  <meta name="application-name" content="環保電子香" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="電子香" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="環保電子香" />
  <meta property="og:title" content="環保電子香｜線上數位上香・電子香爐・牌位祭祖" />
  <meta property="og:description" content="無煙、無火、零空汙的數位上香 App。支援電子香爐、擲筊、牌位祭祖、誦經與早晚拜拜提醒，寺廟與居家皆適用。" />
  <meta property="og:url" content="https://masonzeng702550.github.io/incense/" />
  <meta property="og:image" content="https://masonzeng702550.github.io/incense/assets/icons/icon.svg" />
  <meta property="og:locale" content="zh_TW" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="環保電子香｜線上數位上香" />
  <meta name="twitter:description" content="無煙無火零空汙的數位上香，支援電子香爐、擲筊、牌位祭祖、誦經與拜拜提醒。" />
  <meta name="twitter:image" content="https://masonzeng702550.github.io/incense/assets/icons/icon.svg" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "環保電子香",
    "alternateName": "電子香",
    "url": "https://masonzeng702550.github.io/incense/",
    "description": "無煙、無火、零空汙的數位上香 App，支援電子香爐、擲筊、牌位祭祖、誦經與早晚拜拜提醒。",
    "applicationCategory": "LifestyleApplication",
    "operatingSystem": "Web, iOS, Android",
    "browserRequirements": "Requires JavaScript",
    "inLanguage": "zh-Hant",
    "isAccessibleForFree": true,
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "TWD" }
  }
  </script>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
</head>
<body class="phase-idle">
  <!-- AR 鏡頭背景（手機） / 靜態背景（桌機・降級） -->
  <video id="camera" class="camera-only" playsinline muted></video>
  <div id="altarBg" class="static-altar-bg" aria-hidden="true"></div>

  <!-- 牌位（牌位模式時顯示，置於香之後） -->
  <div id="tablet" class="tablet" aria-hidden="true">
    <svg class="tablet__finial" viewBox="0 0 140 44" aria-hidden="true">
      <path d="M70 4 C58 4 53 15 60 23 C47 14 28 19 29 31 C30 41 47 43 57 36 C61 41 66 43 70 43 C74 43 79 41 83 36 C93 43 110 41 111 31 C112 19 93 14 80 23 C87 15 82 4 70 4 Z" />
      <circle cx="70" cy="9" r="3.4" />
    </svg>
    <div class="tablet__frame">
      <div class="tablet__inner">
        <div class="tablet__cols" id="tabletCols"></div>
        <div class="tablet__suffix" id="tabletSuffix"></div>
      </div>
    </div>
    <svg class="tablet__stand" viewBox="0 0 200 72" aria-hidden="true">
      <path class="stand-body" d="M44 48 H156 L178 72 H22 Z" />
      <rect class="stand-edge" x="40" y="45" width="120" height="4" rx="2" />
      <path class="lotus-petal" d="M40 50 C22 40 28 22 40 18 C52 22 58 40 40 50 Z" />
      <path class="lotus-petal" d="M70 50 C52 40 58 22 70 18 C82 22 88 40 70 50 Z" />
      <path class="lotus-petal" d="M100 50 C82 40 88 22 100 18 C112 22 118 40 100 50 Z" />
      <path class="lotus-petal" d="M130 50 C112 40 118 22 130 18 C142 22 148 40 130 50 Z" />
      <path class="lotus-petal" d="M160 50 C142 40 148 22 160 18 C172 22 178 40 160 50 Z" />
    </svg>
  </div>

  <!-- 香 + 煙 渲染畫布 -->
  <canvas id="stage"></canvas>

  <!-- 啟動遮罩：承接 iOS 手勢限制，於此請求權限 -->
  <div id="gate" class="gate">
    <div class="gate__card">
      <h1 class="gate__title">環保電子香</h1>
      <p class="gate__subtitle">無煙・無火・零空汙的數位參拜</p>
      <button id="startBtn" class="btn btn--primary">開始參拜</button>
      <p class="gate__hint">點擊後將請求鏡頭與感測權限（可拒絕）</p>
    </div>
  </div>

  <!-- 主要操作列 -->
  <header class="topbar">
    <span class="brand">電子香</span>
    <div class="topbar__actions">
      <button id="sutraBtn" class="icon-btn" title="誦經播放" aria-label="誦經播放">誦經</button>
      <button id="muteBtn" class="icon-btn" title="聲音開關" aria-label="聲音開關">聲音</button>
    </div>
  </header>

  <!-- 燃香狀態 -->
  <div id="burnStatus" class="burn-status" hidden>
    <div class="burn-status__bar"><div id="burnFill" class="burn-status__fill"></div></div>
    <span id="burnText" class="burn-status__text">一炷香 10:00</span>
  </div>

  <!-- 底部控制 -->
  <nav class="controls">
    <button id="lightBtn" class="btn btn--primary">點香</button>
    <button id="jiaobeiBtn" class="btn">擲筊</button>
    <button id="settingsBtn" class="btn btn--ghost">設定</button>
  </nav>

  <!-- 擲筊結果 -->
  <div id="jiaobeiResult" class="jiaobei-result" hidden>
    <div class="jiaobei-cups"><span id="cupA" class="cup"></span><span id="cupB" class="cup"></span></div>
    <p id="jiaobeiText" class="jiaobei-text"></p>
  </div>

  <!-- 設定面板 -->
  <aside id="settingsPanel" class="settings" hidden>
    <h2>設定</h2>
    <label class="field">
      <span>一炷香時間：<b id="durLabel">10</b> 分鐘</span>
      <input id="durSlider" type="range" min="1" max="60" value="10" />
    </label>
    <label class="field field--row">
      <input id="autoTime" type="checkbox" />
      <span>依季節 / 溫度自動推算</span>
    </label>
    <label class="field field--row">
      <input id="ecoMode" type="checkbox" />
      <span>省電模式（降低動畫）</span>
    </label>
    <label class="field field--row camera-only">
      <input id="featCamera" type="checkbox" />
      <span>鏡頭 AR 背景</span>
    </label>
    <label class="field field--row camera-only">
      <input id="featMotion" type="checkbox" />
      <span>動態效果（陀螺儀煙霧 / 殘影）</span>
    </label>
    <p id="weatherInfo" class="weather-info"></p>

    <hr class="divider" />
    <div class="field">
      <span>誦經 / 梵音</span>
      <select id="sutraMode">
        <option value="muyu">木魚</option>
        <option value="bell">鐘磬</option>
        <option value="fanyin">梵音（持頌）</option>
        <option value="custom">自訂音檔網址</option>
      </select>
    </div>
    <label class="field" id="sutraUrlField" hidden>
      <span>音檔網址（mp3）</span>
      <input id="sutraUrl" type="text" inputmode="url" placeholder="https://….mp3" />
    </label>
    <label class="field">
      <span>音量：<b id="sutraVolLabel">50</b>％</span>
      <input id="sutraVol" type="range" min="0" max="100" value="50" />
    </label>
    <button id="sutraToggle" type="button" class="btn btn--ghost">▶ 播放 / 暫停 誦經</button>

    <hr class="divider" />
    <label class="field field--row">
      <input id="tabletMode" type="checkbox" />
      <span>牌位模式（香前移，後置牌位）</span>
    </label>
    <div id="tabletOptions" hidden>
      <div class="field">
        <span>牌位樣式</span>
        <div class="seg" id="tabletStyles">
          <button type="button" class="seg__btn" data-style="lotus">蓮位</button>
          <button type="button" class="seg__btn" data-style="spirit">神主牌</button>
          <button type="button" class="seg__btn" data-style="plain">簡約</button>
        </div>
      </div>
      <div class="field">
        <span>對象</span>
        <div class="seg" id="tabletKinds">
          <button type="button" class="seg__btn" data-kind="person">祖先 / 家人</button>
          <button type="button" class="seg__btn" data-kind="pet">寵物</button>
        </div>
      </div>

      <div id="personFields">
        <label class="field">
          <span>姓</span>
          <input id="surname" type="text" placeholder="例：王" maxlength="4" />
        </label>
        <label class="field">
          <span>名</span>
          <input id="givenName" type="text" placeholder="例：大明" maxlength="8" />
        </label>
        <label class="field">
          <span>稱謂模板</span>
          <select id="tabletTemplate">
            <option value="wangsheng">名諱＋姓氏歷代＋往生蓮位</option>
            <option value="lianwei">名諱＋之蓮位</option>
            <option value="lidai">姓氏歷代祖先＋之蓮位</option>
            <option value="lingwei">名諱＋之靈位</option>
            <option value="raw">自訂（只顯示名諱）</option>
          </select>
        </label>
      </div>

      <div id="petFields" hidden>
        <label class="field">
          <span>名字 / 綽號</span>
          <input id="petName" type="text" placeholder="例：小白" maxlength="8" />
        </label>
        <label class="field">
          <span>稱謂模板</span>
          <select id="petTemplate">
            <option value="pet_wangsheng">綽號＋往生蓮位</option>
            <option value="pet_aichong">愛寵＋綽號＋之蓮位</option>
            <option value="pet_lingwei">綽號＋之靈位</option>
            <option value="pet_raw">自訂（只顯示綽號）</option>
          </select>
        </label>
      </div>

      <hr class="divider" />
      <div class="field">
        <span>牌位管理（可存多筆）</span>
        <div id="savedTablets" class="saved-list"></div>
        <button type="button" id="saveTablet" class="btn btn--ghost">＋ 儲存目前為新牌位</button>
      </div>
      <p class="weather-info">牌位與清單會記住（存於 cookie）。</p>
    </div>

    <button id="closeSettings" class="btn btn--ghost">關閉</button>
  </aside>

  <!-- 打火機（由螢幕上方往下點，火焰朝下） -->
  <div id="lighter" class="lighter" aria-hidden="true">
    <svg viewBox="0 0 64 172" width="64" height="172">
      <defs>
        <linearGradient id="lg-body" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#6e1414"/>
          <stop offset="0.5" stop-color="#b53030"/>
          <stop offset="1" stop-color="#5a0f0f"/>
        </linearGradient>
        <linearGradient id="lg-metal" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#8a8d92"/>
          <stop offset="0.5" stop-color="#e9ecef"/>
          <stop offset="1" stop-color="#7a7d82"/>
        </linearGradient>
        <radialGradient id="lg-flame-out" cx="50%" cy="28%" r="62%">
          <stop offset="0" stop-color="#ffd24a"/>
          <stop offset="0.55" stop-color="#ff8a18"/>
          <stop offset="1" stop-color="#ff5a00" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="lg-flame-in" cx="50%" cy="22%" r="55%">
          <stop offset="0" stop-color="#ffffff"/>
          <stop offset="0.5" stop-color="#bfe0ff"/>
          <stop offset="1" stop-color="#4f9bd8" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- 機身（上） -->
      <rect x="16" y="6" width="32" height="84" rx="9" fill="url(#lg-body)" stroke="#3c0c0c" stroke-width="1"/>
      <rect x="21" y="14" width="5" height="68" rx="2.5" fill="#fff" opacity="0.18"/>

      <!-- 金屬罩 + 噴嘴 + 火石輪 -->
      <rect x="18" y="88" width="28" height="22" rx="3" fill="url(#lg-metal)"/>
      <rect x="29" y="108" width="6" height="10" rx="2" fill="#9aa0a6"/>
      <circle cx="46" cy="100" r="6" fill="#c9ccd1" stroke="#6a6d72" stroke-width="1.5"/>
      <circle cx="46" cy="100" r="2" fill="#6a6d72"/>

      <!-- 火焰（朝下） -->
      <g class="lighter-flame">
        <path class="flame-outer" d="M32 166 C44 142 50 128 32 110 C14 128 20 142 32 166 Z" fill="url(#lg-flame-out)"/>
        <path class="flame-inner" d="M32 142 C39 130 41 122 32 112 C23 122 25 130 32 142 Z" fill="url(#lg-flame-in)"/>
      </g>
    </svg>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
