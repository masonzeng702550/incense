<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#8b1a1a" />
  <meta name="description" content="環保電子香 — 無煙無火的數位上香，供寺廟與信眾使用。" />
  <title>環保電子香</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
</head>
<body class="phase-idle">
  <!-- AR 鏡頭背景（手機） / 靜態背景（桌機・降級） -->
  <video id="camera" class="camera-only" playsinline muted></video>
  <div id="altarBg" class="static-altar-bg" aria-hidden="true"></div>

  <!-- 香 + 煙 渲染畫布 -->
  <canvas id="stage"></canvas>

  <!-- 啟動遮罩：承接 iOS 手勢限制，於此請求權限 -->
  <div id="gate" class="gate">
    <div class="gate__card">
      <h1 class="gate__title">環保電子香</h1>
      <p class="gate__subtitle">無煙・無火・零空汙的數位參拜</p>
      <button id="startBtn" class="btn btn--primary">開始參拜</button>
      <p class="gate__hint">點擊後將請求鏡頭與感測權限（可拒絕）</p>
    </div>
  </div>

  <!-- 主要操作列 -->
  <header class="topbar">
    <span class="brand">電子香</span>
    <button id="muteBtn" class="icon-btn" title="聲音開關" aria-label="聲音開關">聲音</button>
  </header>

  <!-- 燃香狀態 -->
  <div id="burnStatus" class="burn-status" hidden>
    <div class="burn-status__bar"><div id="burnFill" class="burn-status__fill"></div></div>
    <span id="burnText" class="burn-status__text">一炷香 10:00</span>
  </div>

  <!-- 底部控制 -->
  <nav class="controls">
    <button id="lightBtn" class="btn btn--primary">點香</button>
    <button id="jiaobeiBtn" class="btn">擲筊</button>
    <button id="settingsBtn" class="btn btn--ghost">設定</button>
  </nav>

  <!-- 擲筊結果 -->
  <div id="jiaobeiResult" class="jiaobei-result" hidden>
    <div class="jiaobei-cups"><span id="cupA" class="cup"></span><span id="cupB" class="cup"></span></div>
    <p id="jiaobeiText" class="jiaobei-text"></p>
  </div>

  <!-- 設定面板 -->
  <aside id="settingsPanel" class="settings" hidden>
    <h2>設定</h2>
    <label class="field">
      <span>一炷香時間：<b id="durLabel">10</b> 分鐘</span>
      <input id="durSlider" type="range" min="1" max="60" value="10" />
    </label>
    <label class="field field--row">
      <input id="autoTime" type="checkbox" />
      <span>依季節 / 溫度自動推算</span>
    </label>
    <label class="field field--row">
      <input id="ecoMode" type="checkbox" />
      <span>省電模式（降低動畫）</span>
    </label>
    <p id="weatherInfo" class="weather-info"></p>
    <button id="closeSettings" class="btn btn--ghost">關閉</button>
  </aside>

  <!-- 打火機（由螢幕上方往下點，火焰朝下） -->
  <div id="lighter" class="lighter" aria-hidden="true">
    <svg viewBox="0 0 64 172" width="64" height="172">
      <defs>
        <linearGradient id="lg-body" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#6e1414"/>
          <stop offset="0.5" stop-color="#b53030"/>
          <stop offset="1" stop-color="#5a0f0f"/>
        </linearGradient>
        <linearGradient id="lg-metal" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#8a8d92"/>
          <stop offset="0.5" stop-color="#e9ecef"/>
          <stop offset="1" stop-color="#7a7d82"/>
        </linearGradient>
        <radialGradient id="lg-flame-out" cx="50%" cy="28%" r="62%">
          <stop offset="0" stop-color="#ffd24a"/>
          <stop offset="0.55" stop-color="#ff8a18"/>
          <stop offset="1" stop-color="#ff5a00" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="lg-flame-in" cx="50%" cy="22%" r="55%">
          <stop offset="0" stop-color="#ffffff"/>
          <stop offset="0.5" stop-color="#bfe0ff"/>
          <stop offset="1" stop-color="#4f9bd8" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- 機身（上） -->
      <rect x="16" y="6" width="32" height="84" rx="9" fill="url(#lg-body)" stroke="#3c0c0c" stroke-width="1"/>
      <rect x="21" y="14" width="5" height="68" rx="2.5" fill="#fff" opacity="0.18"/>

      <!-- 金屬罩 + 噴嘴 + 火石輪 -->
      <rect x="18" y="88" width="28" height="22" rx="3" fill="url(#lg-metal)"/>
      <rect x="29" y="108" width="6" height="10" rx="2" fill="#9aa0a6"/>
      <circle cx="46" cy="100" r="6" fill="#c9ccd1" stroke="#6a6d72" stroke-width="1.5"/>
      <circle cx="46" cy="100" r="2" fill="#6a6d72"/>

      <!-- 火焰（朝下） -->
      <g class="lighter-flame">
        <path class="flame-outer" d="M32 166 C44 142 50 128 32 110 C14 128 20 142 32 166 Z" fill="url(#lg-flame-out)"/>
        <path class="flame-inner" d="M32 142 C39 130 41 122 32 112 C23 122 25 130 32 142 Z" fill="url(#lg-flame-in)"/>
      </g>
    </svg>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
